name: "Release Notes Scribe"
description: "Generate draft release notes using OpenAI Responses API and create a GitHub draft release"
author: "release-notes-scribe"
branding:
  icon: "file-text"
  color: "blue"

inputs:
  openai_api_key:
    description: "OpenAI-compatible API key (Responses API required)."
    required: true
  openai_base_url:
    description: "Optional base URL for OpenAI-compatible providers."
    required: false
    default: ""
  model:
    description: "Model name (must support OpenAI Responses API)."
    required: false
    default: "gpt-5.6-terra"
  github_token:
    description: "GitHub token with contents:write permissions. Defaults to GITHUB_TOKEN env var."
    required: false
    default: ""
  tag:
    description: "Release tag. Defaults to the tag that triggered the workflow."
    required: false
    default: ""
  previous_tag:
    description: "Override the previous tag for comparison."
    required: false
    default: ""
  include_github_generated_notes:
    description: "Include GitHub-generated release notes as extra context for the model."
    required: false
    default: "false"
  redact_secrets:
    description: "Redact likely secrets before sending release context to OpenAI."
    required: false
    default: "true"
  max_diff_lines:
    description: "Max diff lines per commit to include in the prompt."
    required: false
    default: "120"
  max_commits:
    description: "Max commits to include in the prompt."
    required: false
    default: "200"
  max_stage_chars:
    description: "Max characters per summarization stage (approx 4 chars/token)."
    required: false
    default: "400000"
  source_extensions:
    description: "Comma/space-separated list of source code file extensions to diff (e.g. .ts,.py). Non-source files are filename-only."
    required: false
    default: ""
  draft:
    description: "Create the release as a draft."
    required: false
    default: "true"
  prerelease:
    description: "Mark the release as a prerelease."
    required: false
    default: "false"
  create_release:
    description: "Create or update a GitHub Release. Set to false to only generate release_notes output."
    required: false
    default: "true"
  existing_release_behavior:
    description: "What to do when a release for the tag already exists: update_draft, fail, or update_any."
    required: false
    default: "update_draft"
  release_name:
    description: "Override the release title. Defaults to the tag."
    required: false
    default: ""

outputs:
  release_notes:
    description: "Generated release notes in Markdown."
  release_url:
    description: "URL of the created GitHub release."
  previous_tag:
    description: "Resolved previous tag, or an empty string when comparing against the empty tree."
  commit_count:
    description: "Number of commits included after max_commits truncation."
  prompt_char_count:
    description: "Character count of the prompt used for the final OpenAI response."
  used_batching:
    description: "Whether the action summarized commits in batches before final release-note generation."
  redaction_count:
    description: "Number of likely secrets redacted before sending context to OpenAI."

runs:
  using: "node24"
  main: "dist/index.js"
